apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloud-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "cloud-app"
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cloud-app-service.cloud-app.svc.cluster.local:8080"]

      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
